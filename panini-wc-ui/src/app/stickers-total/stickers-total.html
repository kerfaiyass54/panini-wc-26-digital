<div class="stats-page">

  <!-- BACKGROUND -->
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <!-- HERO -->
  <section class="hero">

    <h1 class="title">
      Sticker Collection Statistics
    </h1>

    <p class="subtitle">
      Track your World Cup sticker journey in real time
    </p>

  </section>

  <!-- STATS GRID -->
  <section class="stats-grid">

    <div class="stat-card">

      <div class="card-glow"></div>

      <div class="stat-icon">
        📦
      </div>

      <div class="stat-value">
        {{ stats.totalOwnedStickers }}
      </div>

      <div class="stat-label">
        Total Stickers
      </div>

    </div>

    <div class="stat-card">

      <div class="card-glow"></div>

      <div class="stat-icon">
        🌍
      </div>

      <div class="stat-value">
        {{ stats.totalFinishedCountries }}
      </div>

      <div class="stat-label">
        Finished Nations
      </div>

    </div>

    <div class="stat-card">

      <div class="card-glow"></div>

      <div class="stat-icon">
        🛡️
      </div>

      <div class="stat-value">
        {{ stats.totalLogos }}
      </div>

      <div class="stat-label">
        Logos Collected
      </div>

    </div>

    <div class="stat-card">

      <div class="card-glow"></div>

      <div class="stat-icon">
        ⚽
      </div>

      <div class="stat-value">
        {{ stats.totalPlayers }}
      </div>

      <div class="stat-label">
        Players Collected
      </div>

    </div>

  </section>

</div>
